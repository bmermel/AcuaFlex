name: acuaflex_v1
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.2.0
  # 17.0.1+ exige Dart >=3.9; con SDK 3.7 queda 17.0.0
  go_router: ">=17.0.0 <17.0.1"
  image: ^4.5.4
  image_picker: ^1.2.0
  mobile_scanner: ^7.2.0
  qr_flutter: ^4.1.0
  # <2.5.4: versiones 2.5.4+ exigen Dart >=3.9 (Flutter del usuario: 3.7)
  shared_preferences: ">=2.3.3 <2.5.4"
  url_launcher: ^6.3.0
  http: ^1.3.0
  flutter_signature_pad: ^3.0.1
  sqflite: ^2.4.2
  path: ^1.9.0
  path_provider: ^2.1.5
  connectivity_plus: ^7.1.1
  geolocator: ^14.0.2
  printing: ^5.14.3
  pdf: ^3.11.3
  barcode: ^2.2.9
  flutter_svg: ^2.2.2
  package_info_plus: ^9.0.1
  open_file: ^3.5.11
  permission_handler: ^12.0.1
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.6

# Tras reemplazar assets/images/app_brand_icon.png:
#   dart run flutter_launcher_icons
#   dart run flutter_native_splash:create
flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
  image_path: assets/images/app_brand_icon.png
  min_sdk_android: 21
  adaptive_icon_background: "#0D1B2A"
  adaptive_icon_foreground: assets/images/app_brand_icon.png

flutter_native_splash:
  color: "#F5F5F5"
  android_12:
    color: "#F5F5F5"
  web: true

flutter:
  uses-material-design: true
  assets:
    - assets/images/
